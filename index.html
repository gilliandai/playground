<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2f765d">
    <title>Playground</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f8;
        --surface: #ffffff;
        --line: #d8dfdc;
        --text: #18211f;
        --muted: #65716d;
        --accent: #2f765d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 7vw, 48px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .intro {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .tool-list {
        display: grid;
        gap: 12px;
      }

      .tool-card {
        display: grid;
        gap: 8px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: inherit;
        text-decoration: none;
      }

      .tool-card:hover {
        border-color: var(--accent);
      }

      .tool-card strong {
        font-size: 20px;
      }

      .tool-card span {
        color: var(--muted);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Playground</h1>
      <p class="intro">一些可以直接在浏览器里运行的小工具。</p>

      <div class="tool-list">
        <a class="tool-card" href="./reading-bookmark/">
          <strong>阅读书签</strong>
          <span>记录正在看的书、进度、评分、分类和笔记。</span>
        </a>
      </div>
    </main>
  </body>
</html>
